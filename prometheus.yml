# Prometheus Configuration for Viewora Backend
# 
# Deploy to: /etc/prometheus/prometheus.yml (or equivalent)
# Restart Prometheus after changes: systemctl restart prometheus
#
# Usage:
# 1. Save this file to /etc/prometheus/prometheus.yml
# 2. Copy prometheus-rules.yml to /etc/prometheus/rules/
# 3. systemctl restart prometheus
# 4. Access dashboard at http://prometheus:9090

global:
  scrape_interval: 15s          # How often to scrape targets
  evaluation_interval: 15s       # How often to evaluate alert rules
  external_labels:
    environment: production
    service: viewora-backend

# Alertmanager configuration (for sending alerts)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Replace with your AlertManager instance
            - alertmanager:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/prometheus-rules.yml'

scrape_configs:
  # Viewora API metrics
  - job_name: 'viewora-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: viewora-backend
          component: api
    scrape_interval: 10s
    scrape_timeout: 5s

  # Optional: Prometheus's own metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Optional: Node Exporter (system metrics)
  # Install: https://github.com/prometheus/node_exporter
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']

  # Optional: Redis metrics (job queue monitoring)
  # Install: https://github.com/oliver006/redis_exporter
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['localhost:6379']
  #       labels:
  #         service: redis
  #         component: queue
